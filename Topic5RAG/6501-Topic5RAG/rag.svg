<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320" role="img" aria-label="Retrieval Augmented Generation pipeline diagram">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 14; }
      .title { font: 700 20px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #111827; }
      .label { font: 500 16px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #111827; }
      .muted { font: 400 14px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #4b5563; }
      .arrow { stroke: #111827; stroke-width: 3; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#111827" />
    </marker>
  </defs>

  <text x="30" y="42" class="title">RAG (Retrieval Augmented Generation) - Pipeline</text>
  <text x="30" y="68" class="muted">Query -> retrieve relevant chunks -> augment prompt -> generate grounded answer</text>

  <!-- Boxes -->
  <rect x="40"  y="110" width="170" height="90" class="box" />
  <rect x="250" y="110" width="170" height="90" class="box" />
  <rect x="460" y="110" width="170" height="90" class="box" />
  <rect x="670" y="110" width="190" height="90" class="box" />

  <!-- Labels -->
  <text x="125" y="150" text-anchor="middle" class="label">User Query</text>
  <text x="335" y="145" text-anchor="middle" class="label">Retriever</text>
  <text x="335" y="170" text-anchor="middle" class="muted">(embeddings + search)</text>
  <text x="545" y="145" text-anchor="middle" class="label">Context</text>
  <text x="545" y="170" text-anchor="middle" class="muted">Top-k chunks</text>
  <text x="765" y="145" text-anchor="middle" class="label">LLM Answer</text>
  <text x="765" y="170" text-anchor="middle" class="muted">Grounded output</text>

  <!-- Arrows -->
  <line x1="210" y1="155" x2="250" y2="155" class="arrow" />
  <line x1="420" y1="155" x2="460" y2="155" class="arrow" />
  <line x1="630" y1="155" x2="670" y2="155" class="arrow" />

  <!-- Vector DB callout -->
  <rect x="285" y="225" width="300" height="70" class="box" />
  <text x="435" y="255" text-anchor="middle" class="label">Vector Database / Index</text>
  <text x="435" y="278" text-anchor="middle" class="muted">Chunks + embeddings</text>

  <line x1="335" y1="200" x2="335" y2="225" class="arrow" />
</svg>
